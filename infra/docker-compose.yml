version: '3.8'

services:
  mqtt:
    image: eclipse-mosquitto
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  telegram-bot:
    build: ./bot
    container_name: telegram-bot
    depends_on:
      - mqtt
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - BOT_TOKEN=YOUR_TELEGRAM_BOT_TOKEN
      - CHAT_ID=YOUR_CHAT_ID
